[General]
cmdenv-express-mode = true
cmdenv-autoflush = true
cmdenv-status-frequency = 1s
cmdenv-interactive = true
**.cmdenv-log-level = info

ned-path = .
image-path = ../../images

network = OttawaScenario

debug-on-errors = false
print-undisposed = false

sim-time-limit = 300s

**.scalar-recording = true
**.vector-recording = true

**.debug = false
**.coreDebug = false

*.playgroundSizeX = 2800m
*.playgroundSizeY = 2900m
*.playgroundSizeZ = 50m

*.annotations.draw = true

*.obstacles.obstacles = xmldoc("config.xml", "//AnalogueModel[@type='SimpleObstacleShadowing']/obstacles")

*.manager.updateInterval = 0.1s
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.autoShutdown = false
*.manager.launchConfig = xmldoc("ottawa.launchd.xml")
*.manager.moduleType = "org.car2x.veins.nodes.Car"
*.manager.moduleName = "node"
*.manager.moduleDisplayString = ""

*.connectionManager.sendDirect = true
*.connectionManager.maxInterfDist = 420m
*.connectionManager.drawMaxIntfDist = true

*.**.nic.mac1609_4.useServiceChannel = false
*.**.nic.mac1609_4.txPower = 20mW
*.**.nic.mac1609_4.bitrate = 6Mbps
*.**.nic.phy80211p.minPowerLevel = -89dBm

*.**.nic.phy80211p.useNoiseFloor = true
*.**.nic.phy80211p.noiseFloor = -98dBm

*.**.nic.phy80211p.decider = xmldoc("config.xml")
*.**.nic.phy80211p.analogueModels = xmldoc("config.xml")
*.**.nic.phy80211p.usePropagationDelay = true

*.**.nic.phy80211p.antenna = xmldoc("antenna.xml", "/root/Antenna[@id='monopole']")
*.node[*].nic.phy80211p.antennaOffsetY = 0 m
*.node[*].nic.phy80211p.antennaOffsetZ = 1.895 m

*.node[*].veinsmobility.x = 0
*.node[*].veinsmobility.y = 0
*.node[*].veinsmobility.z = 0
*.node[*].veinsmobility.setHostSpeed = false
*.node[*].veinsmobility.accidentCount = 0

*.node[*].applType = "JosephVeinsApp"
*.node[*].appl.headerLength = 80 bit
*.node[*].appl.sendBeacons = true
*.node[*].appl.dataOnSch = false
*.node[*].appl.beaconInterval = 0.1s
*.node[*].appl.beaconLengthBits = 256bit
*.node[*].appl.dataLengthBits = 1024bit
*.node[*].appl.beaconPriority = 2

*.node[*].appl.EnablePC = true
*.node[*].appl.EnableV1 = true
*.node[*].appl.EnableV2 = true

*.node[*].appl.LOCAL_ATTACKER_PROB = 0.2
*.node[*].appl.MixLocalAttacks = true
*.node[*].appl.LOCAL_ATTACK_TYPE = 7

*.node[*].appl.RandomPosX = 50
*.node[*].appl.RandomPosY = 50
*.node[*].appl.RandomSpeedX = 40
*.node[*].appl.RandomSpeedY = 40

*.node[*].appl.writeVeremi = true
*.node[*].appl.writeBsmsV1 = true
*.node[*].appl.writeBsmsV2 = true
*.node[*].appl.writeListBsmsV2 = true

*.node[*].appl.EnableLocalDetection = true
*.node[*].appl.checkableApps = "ThresholdApp ExperiApp"

*.node[*].appl.MAX_PLAUSIBLE_SPEED = 60
*.node[*].appl.MAX_PLAUSIBLE_ACCEL = 10
*.node[*].appl.MAX_PLAUSIBLE_DECEL = 10
*.node[*].appl.BEACON_HISTORY_SIZE = 10

*.node[*].appl.writeMdDetection = true
*.node[*].appl.writeMdBReport = true
*.node[*].appl.writeMdStats = true
*.node[*].appl.writeDash = true
